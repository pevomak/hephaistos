<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

</head>

<body class="bg-surface-base text-slate-900 overflow-x-hidden relative">

    <!-- Premium Decorative Geometric Background Elements -->
    <div class="absolute inset-0 z-[-1] pointer-events-none opacity-25">
        <div class="absolute top-0 right-0 w-[500px] h-[500px] rounded-full bg-gradient-to-br from-brand-primary/10 via-brand-accent/5 to-transparent blur-3xl"></div>
        <div class="absolute top-1/2 left-0 w-[400px] h-[400px] rounded-full bg-gradient-to-tr from-slate-900/10 via-brand-primary/5 to-transparent blur-3xl"></div>
    </div>

    <div id="app-root" class="min-h-screen flex flex-col justify-between">
        <!-- HEADER / LANGUAGE SWITCHER -->
        <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
            <div class="container mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-brand-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-brand-primary/20">
                        <i data-lucide="cog" class="w-6 h-6 animate-spin-slow"></i>
                    </div>
                    <div>
                        <span class="text-2xl font-extrabold text-slate-900 tracking-tight block">Hephaestus</span>
                        <span class="text-xs font-semibold uppercase tracking-widest text-brand-primary -mt-1 block">Craft</span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex gap-1 bg-slate-100 p-1.5 rounded-xl border border-slate-200/50" id="lang-switcher">
                        <!-- Buttons injected via JS dynamically based on JSON registry -->
                    </div>
                </div>
            </div>
        </header>

        <main id="main-mount" class="lang-transition flex-grow"></main>

        <!-- FOOTER -->
        <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800">
            <div class="container mx-auto px-6">
                <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-brand-primary/15 rounded-lg flex items-center justify-center text-brand-primary">
                            <i data-lucide="cog" class="w-5 h-5"></i>
                        </div>
                        <span class="text-white font-bold text-lg">HEPHAESTUS CRAFT LIMITED</span>
                    </div>
                    <div class="text-sm text-center md:text-right">
                        <p>© 2026 Hephaestus Craft. All rights reserved.</p>
                        <p class="text-xs text-slate-500 mt-1">Incorporated under the Companies Act 2006 in England and Wales.</p>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- ATOMIC COMPONENT TEMPLATES -->
    
    <!-- Hero Template -->
    <template id="tpl-hero">
        <section class="relative py-20 lg:py-28 overflow-hidden flex items-center">
            <div class="container mx-auto px-6 max-w-5xl text-center relative z-10">
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-brand-primary/10 text-brand-primary text-xs font-bold uppercase tracking-wider rounded-full mb-6">
                    <i data-lucide="globe" class="w-3.5 h-3.5"></i> Global Automotive Supply-Chain
                </span>
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-black mb-6 text-slate-900 leading-[1.15] tracking-tight lang-transition">{{H1}}</h1>
                <p class="text-lg md:text-xl text-slate-600 mb-10 max-w-3xl mx-auto leading-relaxed lang-transition">{{P}}</p>
                <div class="flex flex-wrap justify-center gap-6">
                    <a href="tel:{{PHONE}}" class="inline-flex items-center gap-3 bg-brand-primary hover:bg-brand-accent text-white px-6 py-3.5 rounded-xl font-semibold shadow-lg shadow-brand-primary/20 transition-all hover:scale-[1.02] active:scale-[0.98]">
                        <i data-lucide="phone-call" class="w-5 h-5"></i>
                        <span>{{PHONE}}</span>
                    </a>
                </div>
            </div>
        </section>
    </template>

    <!-- Services Template -->
    <template id="tpl-services">
        <section class="py-24 bg-slate-50 border-y border-slate-100">
            <div class="container mx-auto px-6 max-w-6xl">
                <div class="text-center max-w-2xl mx-auto mb-16">
                    <h2 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight lang-transition">{{SECTION_TITLE}}</h2>
                    <div class="w-12 h-1 bg-brand-primary mx-auto mt-4 rounded-full"></div>
                </div>
                <div class="grid lg:grid-cols-3 gap-8" id="services-grid-{{ID}}">
                    <!-- Service cards injected dynamically -->
                </div>
            </div>
        </section>
    </template>

    <!-- Company Registry Template -->
    <template id="tpl-registry">
        <section class="py-24 bg-white">
            <div class="container mx-auto px-6 max-w-5xl">
                <div class="bg-gradient-to-br from-slate-900 to-slate-950 rounded-3xl shadow-2xl border border-slate-800 p-8 md:p-14 relative overflow-hidden text-white">
                    <div class="absolute -right-16 -bottom-16 w-64 h-64 bg-brand-primary/10 rounded-full blur-3xl pointer-events-none"></div>
                    
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12 pb-8 border-b border-slate-800">
                        <div class="flex items-center gap-4">
                            <div class="p-3.5 bg-brand-primary/20 border border-brand-primary/30 text-brand-primary rounded-2xl shadow-inner">
                                <i data-lucide="building-2" class="w-7 h-7"></i>
                            </div>
                            <div>
                                <h2 class="text-3xl font-extrabold tracking-tight lang-transition">{{REGISTRY_TITLE}}</h2>
                                <p class="text-xs text-slate-400 mt-1 uppercase tracking-wider font-semibold">Official Corporate Record</p>
                            </div>
                        </div>
                        <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold uppercase rounded-full self-start md:self-auto">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> {{VAT_STATUS}}
                        </span>
                    </div>

                    <div class="grid md:grid-cols-2 gap-x-16 gap-y-10">
                        <!-- Official Details -->
                        <div class="space-y-6">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-l-2 border-brand-primary pl-3 lang-transition">{{LBL_LEGAL}}</h3>
                            <ul class="space-y-4">
                                <li class="flex flex-col border-b border-slate-800 pb-3">
                                    <span class="text-xs text-slate-500 mb-1 lang-transition">{{LBL_NAME}}</span>
                                    <span class="font-medium text-slate-200">{{LEGAL_NAME}}</span>
                                </li>
                                <li class="flex flex-col border-b border-slate-800 pb-3">
                                    <span class="text-xs text-slate-500 mb-1">Company Registration Number</span>
                                    <span class="font-mono text-slate-200">{{ICO}}</span>
                                </li>
                                <li class="flex flex-col border-b border-slate-800 pb-3">
                                    <span class="text-xs text-slate-500 mb-1 lang-transition">{{LBL_REGISTRAR}}</span>
                                    <span class="text-sm text-slate-200 leading-relaxed">{{REGISTRAR}}</span>
                                </li>
                            </ul>
                        </div>

                        <!-- Economic & Social -->
                        <div class="space-y-6">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest border-l-2 border-brand-primary pl-3 lang-transition">{{LBL_ECO}}</h3>
                            <ul class="space-y-4">
                                <li class="flex flex-col border-b border-slate-800 pb-3">
                                    <span class="text-xs text-slate-500 mb-1 lang-transition">{{LBL_EQUITY}}</span>
                                    <span class="font-medium text-slate-200">{{EQUITY}}</span>
                                </li>
                                <li class="flex flex-col border-b border-slate-800 pb-3">
                                    <span class="text-xs text-slate-500 mb-1">Facebook Social Profile</span>
                                    <a href="{{FACEBOOK}}" target="_blank" class="text-brand-accent hover:text-white transition-colors flex items-center gap-1.5 text-sm font-medium">
                                        <i data-lucide="https://find-and-update.company-information.service.gov.uk/company/16838751" class="w-4 h-4"></i> Official Page
                                    </a>
                                </li>
                            </ul>
                            
                            <div class="pt-2">
                                <span class="text-xs text-slate-500 uppercase tracking-widest block mb-3 font-bold lang-transition">{{LBL_PARTNERS}}</span>
                                <div class="flex flex-col gap-2.5" id="partners-{{ID}}">
                                    <!-- Partners injected -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <script>
        const Engine = {
            state: 'LANG1', // Default Language Code (English)
            graph: JSON.parse(document.getElementById('semantic-graph').text),

            init: function() {
                this.renderSwitcher();
                this.render();
            },

            setLanguage: function(langKey) {
                if(this.state === langKey) return;
                this.state = langKey;
                
                // Trigger transition effect
                const main = document.getElementById('main-mount');
                main.style.opacity = 0;
                main.style.transform = 'translateY(8px)';
                setTimeout(() => {
                    this.renderSwitcher();
                    this.render();
                    main.style.opacity = 1;
                    main.style.transform = 'translateY(0)';
                }, 300);
            },

            renderSwitcher: function() {
                const container = document.getElementById('lang-switcher');
                container.innerHTML = '';
                // Dynamic listing of all languages in the JSON graph object
                Object.keys(this.graph.languages).forEach(lang => {
                    const isActive = this.state === lang;
                    const btn = document.createElement('button');
                    btn.className = `px-4 py-2 rounded-xl text-xs uppercase tracking-wider font-bold transition-all ${isActive ? 'bg-white shadow-md text-slate-900 border border-slate-200' : 'text-slate-400 hover:text-slate-900'}`;
                    btn.innerText = this.graph.languages[lang].label;
                    btn.onclick = () => this.setLanguage(lang);
                    container.appendChild(btn);
                });
            },

            render: function() {
                const langData = this.graph.languages[this.state];
                const content = langData.content;
                const regData = this.graph.registry;
                const main = document.getElementById('main-mount');
                main.innerHTML = ''; 

                // SEO Elements
                document.title = langData.metaTitle;
                document.documentElement.lang = langData.code;

                this.graph.components.forEach((comp, idx) => {
                    if(comp.type === 'HERO') {
                        main.insertAdjacentHTML('beforeend', this.compile('tpl-hero', {
                            H1: content.HERO.H1,
                            P: content.HERO.P,
                            PHONE: this.graph.identity.phone
                        }));
                    }

                    if(comp.type === 'SERVICES') {
                        let servicesHtml = this.compile('tpl-services', {
                            ID: idx,
                            SECTION_TITLE: content.SERVICES_TITLE
                        });
                        main.insertAdjacentHTML('beforeend', servicesHtml);
                        
                        const grid = document.getElementById(`services-grid-${idx}`);
                        content.SERVICES.forEach(svc => {
                            grid.insertAdjacentHTML('beforeend', `
                                <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm hover:shadow-xl hover:border-brand-primary/10 transition-all duration-300 group lang-transition">
                                    <div class="w-12 h-12 bg-slate-50 text-slate-900 rounded-xl flex items-center justify-center mb-6 group-hover:bg-brand-primary group-hover:text-white transition-colors duration-300">
                                        <i data-lucide="${svc.ICON}" class="w-6 h-6"></i>
                                    </div>
                                    <h3 class="text-lg font-bold text-slate-900 mb-3 group-hover:text-brand-primary transition-colors">${svc.TITLE}</h3>
                                    <p class="text-sm text-slate-600 leading-relaxed">${svc.DESC}</p>
                                </div>
                            `);
                        });
                    }

                    if(comp.type === 'COMPANY_DATA') {
                        let registryHtml = this.compile('tpl-registry', {
                            ID: idx,
                            REGISTRY_TITLE: content.UI.REGISTRY_TITLE,
                            LBL_LEGAL: content.UI.LBL_LEGAL,
                            LBL_NAME: content.UI.LBL_NAME,
                            LBL_REGISTRAR: content.UI.LBL_REGISTRAR,
                            LBL_ECO: content.UI.LBL_ECO,
                            LBL_EQUITY: content.UI.LBL_EQUITY,
                            LBL_PARTNERS: content.UI.LBL_PARTNERS,
                            
                            LEGAL_NAME: this.graph.identity.legalName,
                            ICO: this.graph.identity.ico,
                            VAT_NUMBER: regData.vatNumber,
                            VAT_STATUS: regData.vatStatus,
                            REGISTRAR: regData.registrar,
                            EQUITY: regData.equity,
                            FACEBOOK: regData.facebook
                        });
                        main.insertAdjacentHTML('beforeend', registryHtml);

                        const partnersContainer = document.getElementById(`partners-${idx}`);
                        regData.partners.forEach(partner => {
                            partnersContainer.insertAdjacentHTML('beforeend', `
                                <div class="flex items-center gap-2.5 bg-slate-800/50 border border-slate-800 px-4 py-2.5 rounded-xl">
                                    <div class="w-2 h-2 rounded-full bg-brand-accent"></div>
                                    <span class="text-xs font-medium text-slate-300">${partner}</span>
                                </div>
                            `);
                        });
                    }
                });

                // Re-initialize Lucide Icons after DOM mount
                lucide.createIcons();
            },

            compile: function(tplId, data) {
                let html = document.getElementById(tplId).innerHTML;
                Object.keys(data).forEach(key => {
                    html = html.split(`{{${key}}}`).join(data[key]);
                });
                return html;
            }
        };

        document.addEventListener('DOMContentLoaded', () => Engine.init());
    </script>
</body>
</html>
